# =============================================================================
# NavieRAG EDA 场景配置（ORD-QA 评估专用）
# 此处是唯一修改入口，脚本运行时会自动 cp 覆盖到子仓库 eda_eval/
# =============================================================================

# ── LLM（生成阶段） ────────────────────────────────────────────────────────────
llm:
  api_base: "${OPENAI_API_BASE:https://api.openai.com/v1}"
  api_key:  "${OPENAI_API_KEY:}"
  model:    "gpt-4o-mini"      # 推荐：gpt-4o-mini（成本低）或 gpt-4o（质量高）
  temperature: 0.0
  max_tokens:  1024

# ── Embedding 模型 ─────────────────────────────────────────────────────────────
embedding:
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  device: "cpu"                # GPU 可改为 "cuda"

# ── 文档切块 ──────────────────────────────────────────────────────────────────
chunking:
  chunk_size:    800
  chunk_overlap: 100

# ── 检索 ──────────────────────────────────────────────────────────────────────
retrieval:
  top_k:     5
  index_dir: "eda_eval/index"

# ── 生成提示词模板 ─────────────────────────────────────────────────────────────
prompt_template: |
  你是一名精通电子设计自动化（EDA）工具的专家助手，特别熟悉 OpenROAD 平台。
  请仅根据下方提供的上下文内容回答问题。
  如果上下文信息不足以回答，请回答"根据现有文档无法确定"，不要编造答案。

  上下文：
  {context}

  问题：{question}

  回答：
